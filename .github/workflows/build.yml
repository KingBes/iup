name: Build All Platforms

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===================================================================
  #  Windows x86_64  (MSVC 2022)
  # ===================================================================
  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg dependencies
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install freetype zlib --triplet x64-windows-static

      - name: Build DLL + Import Library (MSVC)
        run: |
          Write-Host "=== Building IUP Windows x86_64 (MSVC) ===" -ForegroundColor Cyan
          .\build\build_msvc_full.ps1

      - name: Package
        run: |
          $out = "build/windows-x86_64"
          New-Item -ItemType Directory -Force $out | Out-Null
          Copy-Item build/iup.dll $out/
          Copy-Item build/iup.lib $out/
          Copy-Item -Recurse include $out/
          Compress-Archive -Path $out/* -DestinationPath iup-windows-x86_64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iup-windows-x86_64
          path: iup-windows-x86_64.zip

  # ===================================================================
  #  Linux x86_64  (GTK3)
  # ===================================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc g++ make pkg-config wget unzip \
            libgtk-3-dev libfreetype-dev libftgl-dev \
            zlib1g-dev libglu1-mesa-dev libcairo2-dev \
            libgl1-mesa-dev

      - name: Download CD/IM Sources
        run: bash scripts/download_deps.sh

      - name: Build
        run: |
          chmod +x scripts/build_linux.sh
          bash scripts/build_linux.sh

      - name: Package
        run: |
          out=build/linux-x86_64
          mkdir -p "$out"
          cp build/linux/libiup.so  "$out/"
          cp build/linux/libiup.a   "$out/"
          cp -r include "$out/"
          cd build && zip -r ../iup-linux-x86_64.zip linux-x86_64/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iup-linux-x86_64
          path: iup-linux-x86_64.zip

  # ===================================================================
  #  Linux aarch64  (GTK3)
  # ===================================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc g++ make pkg-config wget unzip \
            libgtk-3-dev libfreetype-dev libftgl-dev \
            zlib1g-dev libglu1-mesa-dev libcairo2-dev \
            libgl1-mesa-dev

      - name: Download CD/IM Sources
        run: bash scripts/download_deps.sh

      - name: Build
        run: |
          chmod +x scripts/build_linux.sh
          bash scripts/build_linux.sh

      - name: Package
        run: |
          out=build/linux-aarch64
          mkdir -p "$out"
          cp build/linux/libiup.so  "$out/"
          cp build/linux/libiup.a   "$out/"
          cp -r include "$out/"
          cd build && zip -r ../iup-linux-aarch64.zip linux-aarch64/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iup-linux-aarch64
          path: iup-linux-aarch64.zip

  # ===================================================================
  #  macOS aarch64  (Cocoa)
  # ===================================================================
  macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install freetype wget

      - name: Download CD/IM Sources
        run: bash scripts/download_deps.sh

      - name: Build
        run: |
          chmod +x scripts/build_macos.sh
          bash scripts/build_macos.sh

      - name: Package
        run: |
          out=build/macos-aarch64
          mkdir -p "$out"
          cp build/macos/libiup.dylib "$out/"
          cp build/macos/libiup.a     "$out/"
          cp -r include "$out/"
          cd build && zip -r ../iup-macos-aarch64.zip macos-aarch64/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iup-macos-aarch64
          path: iup-macos-aarch64.zip
